const DEFAULT_GOALS_2026=[{id:"ielts",label:"IELTS 7+ Certificate",icon:"🎯",color:"#F97316"},{id:"quran_read",label:"Finish Qur'an reading lessons (no mistakes)",icon:"📖",color:"#10B981"},{id:"quran_complete",label:"Complete Qur'an 10 times",icon:"🕌",color:"#059669"},{id:"job",label:"Get job at Top Tech Company",icon:"💼",color:"#6366F1"},{id:"business",label:"Build $2K-4K/month project/business",icon:"💰",color:"#EAB308"},{id:"travel",label:"Travel to one new country",icon:"✈️",color:"#EC4899"},{id:"leetcode",label:"Solve 400 LeetCode problems (reach 600 rank)",icon:"🧩",color:"#8B5CF6"},{id:"books",label:"Read & finish 10 books",icon:"📚",color:"#F59E0B"},{id:"masters",label:"Prepare for foreign university Master's",icon:"🎓",color:"#14B8A6"}];

const EMOJI_OPTIONS=["📌","⭐","🎯","📖","🧩","💻","📚","🏃","💡","🔬","✍️","🎨","🎵","🧠","💪","🌟","📝","🔥","🚀","💰"];
const YEARLY_COLORS=["#F97316","#10B981","#6366F1","#EAB308","#EC4899","#8B5CF6","#14B8A6","#F59E0B","#059669","#3B82F6"];
const CAT_COLORS={spiritual:{bg:"#064E3B",text:"#6EE7B7",accent:"#10B981",label:"Spiritual"},growth:{bg:"#1E1B4B",text:"#A5B4FC",accent:"#6366F1",label:"Growth"},health:{bg:"#7C2D12",text:"#FDBA74",accent:"#F97316",label:"Health"},work:{bg:"#1E293B",text:"#94A3B8",accent:"#64748B",label:"Work"},review:{bg:"#3B0764",text:"#D8B4FE",accent:"#A855F7",label:"Review"}};
const DB_COLS=["daily_checks","weekly_progress","monthly_progress","yearly_notes","custom_daily","custom_weekly","custom_monthly","custom_yearly","edit_overrides"];
const STATE_KEYS=["dailyChecks","weeklyProgress","monthlyProgress","yearlyNotes","customDaily","customWeekly","customMonthly","customYearly","editOverrides"];

// ========== AUTH ==========
let authToken=null,authUser=null,authMode="login",authError="",authSuccess="",authLoading=false;

async function sbAuth(ep,body){
  const r=await fetch(`${SB_URL}/auth/v1/${ep}`,{method:"POST",headers:{"apikey":SB_KEY,"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json(); if(!r.ok) throw new Error(d.error_description||d.msg||d.message||"Auth failed"); return d;
}
async function login(email,pw){
  authLoading=true;authError="";authSuccess="";renderAuth();
  try{ const d=await sbAuth("token?grant_type=password",{email,password:pw}); authToken=d.access_token;authUser=d.user; localStorage.setItem("sb_token",authToken);localStorage.setItem("sb_user",JSON.stringify(authUser)); await initApp(); }
  catch(e){ authError=e.message;authLoading=false;renderAuth(); }
}
async function register(email,pw){
  authLoading=true;authError="";authSuccess="";renderAuth();
  try{
    const d=await sbAuth("signup",{email,password:pw});
    if(d.access_token){ authToken=d.access_token;authUser=d.user; localStorage.setItem("sb_token",authToken);localStorage.setItem("sb_user",JSON.stringify(authUser)); await initApp(); }
    else{ authLoading=false;authMode="login";authSuccess="Account created! You can now sign in.";renderAuth(); }
  }catch(e){ authError=e.message;authLoading=false;renderAuth(); }
}
function logout(){ authToken=null;authUser=null; localStorage.removeItem("sb_token");localStorage.removeItem("sb_user"); STATE_KEYS.forEach(k=>localStorage.removeItem("sg_"+k)); renderAuth(); }
function restoreSession(){ const t=localStorage.getItem("sb_token"),u=localStorage.getItem("sb_user"); if(t&&u){authToken=t;authUser=JSON.parse(u);return true} return false; }

function renderAuth(){
  document.getElementById("app").innerHTML=`
  <div class="auth-container"><div class="auth-card">
    <div class="auth-logo">2026 GOALS</div>
    <div class="auth-sub">${authMode==="login"?"Welcome back! Sign in to continue":"Create your account to start tracking"}</div>
    ${authError?`<div class="auth-error">${authError}</div>`:""}
    ${authSuccess?`<div class="auth-success">${authSuccess}</div>`:""}
    <input class="auth-input" id="auth-email" type="email" placeholder="Email" autocomplete="email">
    <input class="auth-input" id="auth-pass" type="password" placeholder="Password (min 6 chars)" autocomplete="${authMode==="register"?"new-password":"current-password"}">
    <button class="auth-btn" id="auth-submit" ${authLoading?"disabled":""}>${authLoading?'<span class="auth-spinner"></span>':""}${authMode==="login"?"Sign In":"Create Account"}</button>
    <div class="auth-switch">${authMode==="login"?'Don\'t have an account? <a id="auth-toggle">Sign up</a>':'Already have an account? <a id="auth-toggle">Sign in</a>'}</div>
  </div></div>`;
  document.getElementById("auth-submit").onclick=()=>{
    const e=document.getElementById("auth-email").value.trim(),p=document.getElementById("auth-pass").value;
    if(!e||!p){authError="Please fill in both fields";authSuccess="";renderAuth();return}
    if(p.length<6){authError="Password must be at least 6 characters";authSuccess="";renderAuth();return}
    authMode==="login"?login(e,p):register(e,p);
  };
  document.getElementById("auth-toggle").onclick=()=>{authMode=authMode==="login"?"register":"login";authError="";authSuccess="";renderAuth()};
  ["auth-email","auth-pass"].forEach(id=>document.getElementById(id)?.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("auth-submit").click()}));
  setTimeout(()=>document.getElementById("auth-email")?.focus(),50);
}

// ========== SUPABASE DATA ==========
const P="sg_";
function loadLocal(k,fb){try{const d=localStorage.getItem(P+k);return d?JSON.parse(d):fb}catch{return fb}}
function saveLocal(k,d){try{localStorage.setItem(P+k,JSON.stringify(d))}catch{}}
let syncStatus="loading",syncTimer=null;

async function sbData(method,body){
  if(!authToken||!authUser)return null;
  try{
    const url=`${SB_URL}/rest/v1/user_data?id=eq.${authUser.id}`;
    const opts={method,headers:{"apikey":SB_KEY,"Authorization":`Bearer ${authToken}`,"Content-Type":"application/json","Prefer":method==="GET"?"return=representation":"return=minimal"}};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(url,opts);
    if(r.status===401){logout();return null}
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    return method==="GET"?await r.json():true;
  }catch(e){console.error("Supabase:",e);return null}
}
async function ensureUserRow(){
  const rows=await sbData("GET");
  if(rows&&rows.length===0){
    try{await fetch(`${SB_URL}/rest/v1/user_data`,{method:"POST",headers:{"apikey":SB_KEY,"Authorization":`Bearer ${authToken}`,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({id:authUser.id})})}catch(e){console.error("Insert:",e)}
  }
}
async function loadFromCloud(){
  syncStatus="loading";updateSyncBadge();
  const rows=await sbData("GET");
  if(rows&&rows.length>0){const row=rows[0];DB_COLS.forEach((col,i)=>{const sk=STATE_KEYS[i];if(row[col]!=null){S[sk]=row[col];saveLocal(sk,row[col])}});syncStatus="synced"}
  else syncStatus="offline";
  updateSyncBadge();render();
}
async function pushToCloud(){
  const body={updated_at:new Date().toISOString()};DB_COLS.forEach((col,i)=>{body[col]=S[STATE_KEYS[i]]});
  const ok=await sbData("PATCH",body);syncStatus=ok?"synced":"offline";updateSyncBadge();
}
function scheduleSync(){clearTimeout(syncTimer);syncStatus="saving";updateSyncBadge();syncTimer=setTimeout(()=>pushToCloud(),800)}
function save(k,d){saveLocal(k,d);scheduleSync()}
function updateSyncBadge(){const el=document.getElementById("sync-badge");if(!el)return;const m={loading:["Loading...","#EAB308"],saving:["Saving...","#EAB308"],synced:["Synced ✓","#10B981"],offline:["Offline","#F97316"]};const[t,c]=m[syncStatus]||m.offline;el.textContent=t;el.style.color=c;el.style.borderColor=c+"44"}

// ========== APP STATE ==========
let S={view:"daily",currentDate:new Date(),dailyChecks:{},weeklyProgress:{},monthlyProgress:{},yearlyNotes:{},customDaily:[],customWeekly:[],customMonthly:[],customYearly:[],editOverrides:{},showForm:null,editingId:null,editType:null,formData:{}};
function loadLocalState(){STATE_KEYS.forEach(k=>{const v=loadLocal(k,null);if(v!==null)S[k]=v})}

// ========== HELPERS ==========
function applyOverrides(list,sk){const sc=S.editOverrides[sk]||{};return list.map(item=>{const ov=sc[item.id];return ov?{...item,...ov}:item})}
function getAllDaily(){const dk=getDateKey(S.currentDate);return applyOverrides([...DEFAULT_DAILY_BLOCKS,...S.customDaily],dk).sort((a,b)=>{const tA=(a.time||"").match(/(\d{1,2}):(\d{2})/),tB=(b.time||"").match(/(\d{1,2}):(\d{2})/);return(tA?tA[1]*60+ +tA[2]:9999)-(tB?tB[1]*60+ +tB[2]:9999)})}
function getAllWeekly(){return applyOverrides([...DEFAULT_WEEKLY_GOALS,...S.customWeekly],getWeekKey(S.currentDate))}
function getAllMonthly(){return applyOverrides([...DEFAULT_MONTHLY_GOALS,...S.customMonthly],getMonthKey(S.currentDate))}
function getAllYearly(){return applyOverrides([...DEFAULT_GOALS_2026,...S.customYearly],"yearly")}
function getDateKey(d){return d.toISOString().split("T")[0]}
function getWeekKey(d){const dd=new Date(d);dd.setDate(dd.getDate()-dd.getDay()+1);return"W_"+dd.toISOString().split("T")[0]}
function getMonthKey(d){return`M_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}
function isToday(d){return getDateKey(d)===getDateKey(new Date())}
function uid(){return"c_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function getStreak(){let s=0;const all=getAllDaily(),d=new Date();const tc=S.dailyChecks[getDateKey(d)];if(tc&&Object.values(tc).filter(Boolean).length>=all.length*.6)s++;d.setDate(d.getDate()-1);while(true){const c=S.dailyChecks[getDateKey(d)];if(!c||Object.values(c).filter(Boolean).length<all.length*.6)break;s++;d.setDate(d.getDate()-1)}return s}

// ========== ACTIONS ==========
function setView(v){S.view=v;S.showForm=null;S.editingId=null;render()}
function navigateDate(delta){const d=new Date(S.currentDate);if(S.view==="daily")d.setDate(d.getDate()+delta);else if(S.view==="weekly")d.setDate(d.getDate()+delta*7);else if(S.view==="monthly")d.setMonth(d.getMonth()+delta);S.currentDate=d;render()}
function toggleDaily(id){const dk=getDateKey(S.currentDate);if(!S.dailyChecks[dk])S.dailyChecks[dk]={};S.dailyChecks[dk][id]=!S.dailyChecks[dk][id];save("dailyChecks",S.dailyChecks);render()}
function updateCounter(type,gid,delta){const m={weekly:[getWeekKey,"weeklyProgress"],monthly:[getMonthKey,"monthlyProgress"]};const[fn,sk]=m[type];const k=fn(S.currentDate);if(!S[sk][k])S[sk][k]={};S[sk][k][gid]=Math.max(0,(S[sk][k][gid]||0)+delta);save(sk,S[sk]);render()}
function toggleYearly(id){S.yearlyNotes[id]=!S.yearlyNotes[id];save("yearlyNotes",S.yearlyNotes);render()}
function showAddForm(type){S.showForm=S.showForm===type?null:type;S.formData={category:"growth",icon:"📌",color:"#6366F1"};render()}
function addDailyTask(){const n=document.getElementById("add-name")?.value?.trim(),t=document.getElementById("add-time")?.value?.trim();if(!n)return;S.customDaily.push({id:uid(),label:n,time:t||"Custom",icon:S.formData.icon||"📌",category:S.formData.category||"growth",isCustom:true});save("customDaily",S.customDaily);S.showForm=null;render()}

function addMonthlyTask(){const n=document.getElementById("add-name")?.value?.trim(),t=parseInt(document.getElementById("add-target")?.value)||1;if(!n)return;S.customMonthly.push({id:uid(),label:n,target:t,isCustom:true});save("customMonthly",S.customMonthly);S.showForm=null;render()}
function addYearlyTask(){const n=document.getElementById("add-name")?.value?.trim();if(!n)return;S.customYearly.push({id:uid(),label:n,icon:S.formData.icon||"⭐",color:S.formData.color||"#6366F1",isCustom:true});save("customYearly",S.customYearly);S.showForm=null;render()}
function deleteCustomTask(type,id){const m={daily:"customDaily",weekly:"customWeekly",monthly:"customMonthly",yearly:"customYearly"};S[m[type]]=S[m[type]].filter(t=>t.id!==id);save(m[type],S[m[type]]);render()}
function setFormCat(c){S.formData.category=c;render()}
function setFormIcon(i){S.formData.icon=i;render()}
function setFormColor(c){S.formData.color=c;render()}
function startEdit(id,type){const lists={daily:getAllDaily,weekly:getAllWeekly,monthly:getAllMonthly,yearly:getAllYearly};const task=lists[type]().find(t=>t.id===id);if(!task)return;S.editingId=id;S.editType=type;S.showForm=null;S.formData={...task};render()}
function cancelEdit(){S.editingId=null;S.editType=null;render()}
function saveEdit(){const id=S.editingId,type=S.editType;if(!id||!type)return;const scopeKey=type==="daily"?getDateKey(S.currentDate):type==="weekly"?getWeekKey(S.currentDate):type==="monthly"?getMonthKey(S.currentDate):"yearly";const updates={};if(type==="daily"){const n=document.getElementById("edit-name")?.value?.trim(),t=document.getElementById("edit-time")?.value?.trim();if(n)updates.label=n;if(t)updates.time=t;updates.category=S.formData.category;updates.icon=S.formData.icon}else if(type==="weekly"||type==="monthly"){const n=document.getElementById("edit-name")?.value?.trim(),t=parseInt(document.getElementById("edit-target")?.value);if(n)updates.label=n;if(t>0)updates.target=t}else{const n=document.getElementById("edit-name")?.value?.trim();if(n)updates.label=n;updates.icon=S.formData.icon;updates.color=S.formData.color}if(!S.editOverrides[scopeKey])S.editOverrides[scopeKey]={};S.editOverrides[scopeKey][id]={...(S.editOverrides[scopeKey][id]||{}),...updates};save("editOverrides",S.editOverrides);S.editingId=null;S.editType=null;render()}
function resetAll(){if(confirm("Reset ALL progress and custom tasks?")){S.dailyChecks={};S.weeklyProgress={};S.monthlyProgress={};S.yearlyNotes={};S.customDaily=[];S.customWeekly=[];S.customMonthly=[];S.customYearly=[];S.editOverrides={};STATE_KEYS.forEach(k=>localStorage.removeItem(P+k));scheduleSync();render()}}

function rDF(){return`<div class="add-form"><div class="add-form-title">✨ New Daily Block</div><div class="form-row"><span class="form-label">Name</span><input class="form-input" id="add-name" placeholder="e.g. Meditation"></div><div class="form-row"><span class="form-label">Time</span><input class="form-input" id="add-time" placeholder="e.g. 06:00 – 06:30"></div><div class="form-row"><span class="form-label">Icon</span><div class="cat-picker">${EMOJI_OPTIONS.map(e=>`<span class="cat-chip ${S.formData.icon===e?"selected":""}" onclick="setFormIcon('${e}')" style="background:rgba(255,255,255,.06);cursor:pointer;font-size:16px;padding:4px 8px">${e}</span>`).join("")}</div></div><div class="form-row"><span class="form-label">Cat</span><div class="cat-picker">${Object.entries(CAT_COLORS).map(([k,v])=>`<span class="cat-chip ${S.formData.category===k?"selected":""}" onclick="setFormCat('${k}')" style="background:${v.accent}22;color:${v.text}">${v.label}</span>`).join("")}</div></div><div class="form-actions"><button class="btn-cancel" onclick="showAddForm(null)">Cancel</button><button class="btn-save" onclick="addDailyTask()">Add Block</button></div></div>`}
function rTF(type,fn){return`<div class="add-form"><div class="add-form-title">✨ New ${type[0].toUpperCase()+type.slice(1)} Goal</div><div class="form-row"><span class="form-label">Goal</span><input class="form-input" id="add-name" placeholder="e.g. 5 gym sessions"></div><div class="form-row"><span class="form-label">Target</span><input class="form-input form-input-sm" id="add-target" type="number" min="1" value="1"></div><div class="form-actions"><button class="btn-cancel" onclick="showAddForm(null)">Cancel</button><button class="btn-save" onclick="${fn}">Add Goal</button></div></div>`}
function rCC(goal,progress,i,type,dl,dc,ac,dbg,abg,db1,db2,dbd,pc){const curr=progress[goal.id]||0,pct=Math.min(100,Math.round(curr/goal.target*100)),done=curr>=goal.target,bg=done?`background:linear-gradient(135deg,${db1},${db2});border-color:${dbd};`:"";
  if(S.editingId===goal.id)return`<div class="inline-edit fade-up" style="animation-delay:${i*50}ms"><div class="add-form-title">✏️ Edit ${type[0].toUpperCase()+type.slice(1)} Goal</div><div class="form-row"><span class="form-label">Goal</span><input class="form-input" id="edit-name" value="${goal.label.replace(/"/g,'&quot;')}"></div><div class="form-row"><span class="form-label">Target</span><input class="form-input form-input-sm" id="edit-target" type="number" min="1" value="${goal.target}"></div><div class="form-actions"><button class="btn-cancel" onclick="cancelEdit()">Cancel</button><button class="btn-save" onclick="saveEdit()">Save</button></div></div>`;
  const icon=done?(type==="monthly"?"🏆 ":"✅ "):"";
  return`<div class="goal-card fade-up" style="${bg}animation-delay:${i*50}ms"><div class="goal-header"><span class="goal-label" style="color:${done?dl:"#CBD5E1"}">${icon}${goal.label}</span><div style="display:flex;align-items:center;gap:8px"><span class="goal-count" style="color:${done?dc:ac}">${curr}/${goal.target}</span><button class="edit-btn" onclick="startEdit('${goal.id}','${type}')">✏️</button>${goal.isCustom?`<button class="delete-btn" onclick="deleteCustomTask('${type}','${goal.id}')">✕</button>`:""}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${done?dbg:abg}"></div></div><div class="counter-row"><button class="counter-btn counter-minus" onclick="updateCounter('${type}','${goal.id}',-1)">−</button><button class="counter-btn ${pc}" onclick="updateCounter('${type}','${goal.id}',1)">+</button></div></div>`}

// ========== INIT ==========
async function initApp(){loadLocalState();render();await ensureUserRow();await loadFromCloud()}
(async function(){if(restoreSession())await initApp();else renderAuth()})();
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&authToken)loadFromCloud()});
</script>
</body>
</html>
