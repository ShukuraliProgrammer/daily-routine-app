// ========== SUPABASE ==========
const SUPABASE_URL = "https://fbockalnvrtdwvcoukgm.supabase.co";
const SUPABASE_KEY = "sb_publishable_fulsXj71MWbnos33mA5Gsg_N-xwAMZw";
const USER_ID = "default_user";

const DB_COLS = ["daily_checks","weekly_progress","monthly_progress","yearly_notes",
  "custom_daily","custom_weekly","custom_monthly","custom_yearly","edit_overrides"];
const STATE_KEYS = ["dailyChecks","weeklyProgress","monthlyProgress","yearlyNotes",
  "customDaily","customWeekly","customMonthly","customYearly","editOverrides"];

// Column name <-> state key mapping
function colToState(col) { return col.replace(/_([a-z])/g, (_, c) => c.toUpperCase()); }
function stateToCol(key) { return key.replace(/[A-Z]/g, c => "_" + c.toLowerCase()); }

let syncStatus = "loading"; // "loading" | "synced" | "offline" | "error"
let syncTimer = null;

// ========== STORAGE (localStorage as cache + Supabase as source of truth) ==========
const P = "shukurali_goals_";
function loadLocal(k, fb) { try { const d = localStorage.getItem(P+k); return d ? JSON.parse(d) : fb; } catch { return fb; } }
function saveLocal(k, d) { try { localStorage.setItem(P+k, JSON.stringify(d)); } catch {} }

async function supaFetch(method, body) {
  try {
    const url = `${SUPABASE_URL}/rest/v1/user_data?id=eq.${USER_ID}`;
    const opts = {
      method,
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": method === "GET" ? "return=representation" : "return=minimal"
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    if (method === "GET") return await res.json();
    return true;
  } catch (e) {
    console.error("Supabase error:", e);
    return null;
  }
}

async function loadFromSupabase() {
  syncStatus = "loading"; renderSyncBadge();
  const rows = await supaFetch("GET");
  if (rows && rows.length > 0) {
    const row = rows[0];
    DB_COLS.forEach((col, i) => {
      const stateKey = STATE_KEYS[i];
      const val = row[col];
      if (val !== null && val !== undefined) {
        S[stateKey] = val;
        saveLocal(stateKey, val);
      }
    });
    syncStatus = "synced";
  } else {
    syncStatus = "offline";
  }
  renderSyncBadge();
  render();
}

async function pushToSupabase() {
  const body = {};
  DB_COLS.forEach((col, i) => { body[col] = S[STATE_KEYS[i]]; });
  body.updated_at = new Date().toISOString();
  const ok = await supaFetch("PATCH", body);
  syncStatus = ok ? "synced" : "offline";
  renderSyncBadge();
}

// Debounced sync — pushes 800ms after last change
function scheduleSync() {
  clearTimeout(syncTimer);
  syncStatus = "saving";
  renderSyncBadge();
  syncTimer = setTimeout(() => pushToSupabase(), 800);
}

// Save to both localStorage (instant) and Supabase (debounced)
function save(k, d) {
  saveLocal(k, d);
  scheduleSync();
}

function renderSyncBadge() {
  const el = document.getElementById("sync-badge");
  if (!el) return;
  const map = {
    loading: { text: "Loading...", color: "#EAB308" },
    saving: { text: "Saving...", color: "#EAB308" },
    synced: { text: "Synced ✓", color: "#10B981" },
    offline: { text: "Offline", color: "#F97316" },
    error: { text: "Error", color: "#EF4444" },
  };
  const s = map[syncStatus] || map.offline;
  el.textContent = s.text;
  el.style.color = s.color;
  el.style.borderColor = s.color + "44";
}

// ========== STATE ==========
let S = {
  view: "daily",
  currentDate: new Date(),
  dailyChecks: loadLocal("dailyChecks", {}),
  weeklyProgress: loadLocal("weeklyProgress", {}),
  monthlyProgress: loadLocal("monthlyProgress", {}),
  yearlyNotes: loadLocal("yearlyNotes", {}),
  // Custom tasks stored separately
  customDaily: loadLocal("customDaily", []),
  customWeekly: loadLocal("customWeekly", []),
  customMonthly: loadLocal("customMonthly", []),
  customYearly: loadLocal("customYearly", []),
  // Edits to default tasks — scoped by date/week/month key
  // Structure: { "2026-03-14": { "fajr": {time:"..."} }, "W_2026-03-10": {...}, "M_2026-03": {...}, "yearly": {...} }
  editOverrides: loadLocal("editOverrides", {}),
  // Form states
  showForm: null, // "daily" | "weekly" | "monthly" | "yearly" | null
  editingId: null, // id of task currently being edited
  formData: {},
};

function applyOverrides(list, scopeKey) {
  const scoped = S.editOverrides[scopeKey] || {};
  return list.map(item => {
    const ov = scoped[item.id];
    return ov ? { ...item, ...ov } : item;
  });
}
function getAllDaily() {
  const dk = getDateKey(S.currentDate);
  const list = applyOverrides([...DEFAULT_DAILY_BLOCKS, ...S.customDaily], dk);
  return list.sort((a, b) => {
    const tA = (a.time || "").match(/(\d{1,2}):(\d{2})/);
    const tB = (b.time || "").match(/(\d{1,2}):(\d{2})/);
    const mA = tA ? parseInt(tA[1]) * 60 + parseInt(tA[2]) : 9999;
    const mB = tB ? parseInt(tB[1]) * 60 + parseInt(tB[2]) : 9999;
    return mA - mB;
  });
}
function getAllWeekly() { return applyOverrides([...DEFAULT_WEEKLY_GOALS, ...S.customWeekly], getWeekKey(S.currentDate)); }
function getAllMonthly() { return applyOverrides([...DEFAULT_MONTHLY_GOALS, ...S.customMonthly], getMonthKey(S.currentDate)); }
function getAllYearly() { return applyOverrides([...DEFAULT_GOALS_2026, ...S.customYearly], "yearly"); }

function getDateKey(d) { return d.toISOString().split("T")[0]; }
function getWeekKey(d) { const dd = new Date(d); dd.setDate(dd.getDate()-dd.getDay()+1); return "W_"+dd.toISOString().split("T")[0]; }
function getMonthKey(d) { return `M_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
function isToday(d) { return getDateKey(d) === getDateKey(new Date()); }
function uid() { return "c_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function getStreak() {
  let s = 0;
  const all = getAllDaily();
  const d = new Date();
  const todayKey = getDateKey(d);
  const tc = S.dailyChecks[todayKey];
  if (tc && Object.values(tc).filter(Boolean).length >= all.length * 0.6) s++;
  d.setDate(d.getDate()-1);
  while (true) {
    const k = getDateKey(d);
    const c = S.dailyChecks[k];
    if (!c) break;
    if (Object.values(c).filter(Boolean).length < all.length * 0.6) break;
    s++; d.setDate(d.getDate()-1);
  }
  return s;
}

// ========== ACTIONS ==========
function setView(v) { S.view = v; S.showForm = null; render(); }
function navigateDate(delta) {
  const d = new Date(S.currentDate);
  if (S.view === "daily") d.setDate(d.getDate()+delta);
  else if (S.view === "weekly") d.setDate(d.getDate()+delta*7);
  else if (S.view === "monthly") d.setMonth(d.getMonth()+delta);
  S.currentDate = d; render();
}
function toggleDaily(id) {
  const dk = getDateKey(S.currentDate);
  if (!S.dailyChecks[dk]) S.dailyChecks[dk] = {};
  S.dailyChecks[dk][id] = !S.dailyChecks[dk][id];
  save("dailyChecks", S.dailyChecks); render();
}
function updateCounter(type, goalId, delta) {
  const keyMap = { weekly: [getWeekKey, "weeklyProgress"], monthly: [getMonthKey, "monthlyProgress"] };
  const [keyFn, stateKey] = keyMap[type];
  const k = keyFn(S.currentDate);
  if (!S[stateKey][k]) S[stateKey][k] = {};
  S[stateKey][k][goalId] = Math.max(0, (S[stateKey][k][goalId] || 0) + delta);
  save(stateKey, S[stateKey]); render();
}
function toggleYearly(id) { S.yearlyNotes[id] = !S.yearlyNotes[id]; save("yearlyNotes", S.yearlyNotes); render(); }

// Add task forms
function showAddForm(type) { S.showForm = S.showForm === type ? null : type; S.formData = { category: "growth", icon: "📌", color: "#6366F1" }; render(); }

function addDailyTask() {

}

function addMonthlyTask() {

function addYearlyTask() {

  save("customYearly", S.customYearly); S.showForm = null; render();
}

function deleteCustomTask(type, id) {
  const keyMap = { daily: "customDaily", weekly: "customWeekly", monthly: "customMonthly", yearly: "customYearly" };
  S[keyMap[type]] = S[keyMap[type]].filter(t => t.id !== id);
  save(keyMap[type], S[keyMap[type]]); render();
}

function setFormCat(cat) { S.formData.category = cat; render(); }
function setFormIcon(icon) { S.formData.icon = icon; render(); }
function setFormColor(color) { S.formData.color = color; render(); }

// ========== EDIT ACTIONS ==========
function startEdit(id, type) {
  // Find the current task data (with overrides applied)
  const lists = { daily: getAllDaily, weekly: getAllWeekly, monthly: getAllMonthly, yearly: getAllYearly };
  const task = lists[type]().find(t => t.id === id);
  if (!task) return;
  S.editingId = id;
  S.editType = type;
  S.showForm = null;
  S.formData = { ...task };
  render();
}

function cancelEdit() { S.editingId = null; S.editType = null; render(); }

function saveEdit() {
  const id = S.editingId;
  const type = S.editType;
  if (!id || !type) return;

  // Determine scope key
  const scopeKey = type === "daily" ? getDateKey(S.currentDate)
    : type === "weekly" ? getWeekKey(S.currentDate)
    : type === "monthly" ? getMonthKey(S.currentDate)
    : "yearly";

  // Collect updates from form
  const updates = {};
  if (type === "daily") {
    const name = document.getElementById("edit-name")?.value?.trim();
    const time = document.getElementById("edit-time")?.value?.trim();
    if (name) updates.label = name;
    if (time) updates.time = time;
    updates.category = S.formData.category;
    updates.icon = S.formData.icon;
  } else if (type === "weekly" || type === "monthly") {
    const name = document.getElementById("edit-name")?.value?.trim();
    const target = parseInt(document.getElementById("edit-target")?.value);
    if (name) updates.label = name;
    if (target > 0) updates.target = target;
  } else if (type === "yearly") {
    const name = document.getElementById("edit-name")?.value?.trim();
    if (name) updates.label = name;
    updates.icon = S.formData.icon;
    updates.color = S.formData.color;
  }

  // Check if it's a custom task — update directly + scoped override
  const customKey = { daily: "customDaily", weekly: "customWeekly", monthly: "customMonthly", yearly: "customYearly" }[type];
  const customIdx = S[customKey].findIndex(t => t.id === id);

  // Always save as scoped override (per-date/week/month)
  if (!S.editOverrides[scopeKey]) S.editOverrides[scopeKey] = {};
  S.editOverrides[scopeKey][id] = { ...(S.editOverrides[scopeKey][id] || {}), ...updates };
  save("editOverrides", S.editOverrides);

  S.editingId = null; S.editType = null;
  render();
}

function resetAll() {
  if (confirm("Are you sure? This will delete ALL your progress AND custom tasks.")) {
    S.dailyChecks = {}; S.weeklyProgress = {}; S.monthlyProgress = {}; S.yearlyNotes = {};
    S.customDaily = []; S.customWeekly = []; S.customMonthly = []; S.customYearly = [];
    S.editOverrides = {};
    ["dailyChecks","weeklyProgress","monthlyProgress","yearlyNotes","customDaily","customWeekly","customMonthly","customYearly","editOverrides"].forEach(k => localStorage.removeItem(P+k));
    pushToSupabase();
    render();
  }
}

            </div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${done?"linear-gradient(90deg,#EAB308,#FDE68A)":"linear-gradient(90deg,#F97316,#FB923C)"}"></div></div>
          <div class="counter-row">
            <button class="counter-btn counter-minus" onclick="updateCounter('monthly','${goal.id}',-1)">−</button>
            <button class="counter-btn counter-plus-orange" onclick="updateCounter('monthly','${goal.id}',1)">+</button>
          </div>
        </div>`;
      }
    });
    h += renderAddButton("monthly", "Add monthly goal");
    if (S.showForm === "monthly") {
      h += `
      <div class="add-form">
        <div class="add-form-title">✨ New Monthly Goal</div>
        <div class="form-row">
          <span class="form-label">Goal</span>
          <input class="form-input" id="add-name" placeholder="e.g. Complete 1 online course" autofocus>
        </div>
        <div class="form-row">
          <span class="form-label">Target</span>
          <input class="form-input form-input-sm" id="add-target" type="number" min="1" value="1" placeholder="1">
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="showAddForm(null)">Cancel</button>
          <button class="btn-save" onclick="addMonthlyTask()">Add Goal</button>
        </div>
      </div>`;
    }
  }

  // ===== YEARLY =====
  if (S.view === "yearly") {
    const doneCount = allYearly.filter(g => S.yearlyNotes[g.id]).length;
    const yPct = allYearly.length ? Math.round((doneCount/allYearly.length)*100) : 0;
    h += `
    <div class="yearly-summary">
      <div class="yearly-count">${doneCount} / ${allYearly.length}</div>
      <div class="yearly-sub">yearly goals completed</div>
      <div class="progress-bar" style="margin-top:12px">
        <div class="progress-fill" style="width:${yPct}%;background:linear-gradient(90deg,#EC4899,#A855F7,#6366F1)"></div>
      </div>
    </div>`;

    allYearly.forEach((goal, i) => {
      const done = S.yearlyNotes[goal.id];
      const bg = done ? `background:linear-gradient(135deg,${goal.color}15,${goal.color}08);border-color:${goal.color}33;` : "";
      const iBg = done ? `background:${goal.color}22;border-color:${goal.color};` : "";
      const isEditing = S.editingId === goal.id;

      if (isEditing) {
        h += `
        <div class="inline-edit fade-up" style="animation-delay:${i*40}ms">
          <div class="add-form-title">✏️ Edit Yearly Goal</div>
          <div class="form-row">
            <span class="form-label">Goal</span>
            <input class="form-input" id="edit-name" value="${goal.label.replace(/"/g,'&quot;')}">
          </div>
          <div class="form-row">
            <span class="form-label">Icon</span>
            <div class="cat-picker">${EMOJI_OPTIONS.map(e =>
              `<span class="cat-chip ${S.formData.icon===e?"selected":""}" onclick="setFormIcon('${e}')"
                style="background:rgba(255,255,255,0.06);cursor:pointer;font-size:16px;padding:4px 8px">${e}</span>`
            ).join("")}</div>
          </div>
          <div class="form-row">
            <span class="form-label">Color</span>
            <div class="cat-picker">${YEARLY_COLORS.map(c =>
              `<span class="cat-chip ${S.formData.color===c?"selected":""}" onclick="setFormColor('${c}')"
                style="background:${c};width:28px;height:28px;border-radius:8px;padding:0"></span>`
            ).join("")}</div>
          </div>
          <div class="form-actions">
            <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
            <button class="btn-save" onclick="saveEdit()">Save</button>
          </div>
        </div>`;
      } else {
        h += `
        <div class="yearly-item fade-up" style="${bg}animation-delay:${i*40}ms" onclick="toggleYearly('${goal.id}')">
          <div class="yearly-icon" style="${iBg}">${done?"✅":goal.icon}</div>
          <span class="yearly-text" style="color:${done?"#FFF":"#94A3B8"};${done?"text-decoration:line-through;text-decoration-color:"+goal.color+"66;":""}">${goal.label}</span>
          <button class="edit-btn" onclick="event.stopPropagation();startEdit('${goal.id}','yearly')" title="Edit">✏️</button>
          ${goal.isCustom ? `<button class="delete-btn" onclick="event.stopPropagation();deleteCustomTask('yearly','${goal.id}')">✕</button>` : ""}
        </div>`;
      }
    });

    h += renderAddButton("yearly", "Add yearly goal");
    if (S.showForm === "yearly") {
      h += `
      <div class="add-form">
        <div class="add-form-title">✨ New Yearly Goal</div>
        <div class="form-row">
          <span class="form-label">Goal</span>
          <input class="form-input" id="add-name" placeholder="e.g. Learn a new language" autofocus>
        </div>
        <div class="form-row">
          <span class="form-label">Icon</span>
          <div class="cat-picker">${EMOJI_OPTIONS.map(e =>
            `<span class="cat-chip ${S.formData.icon===e?"selected":""}" onclick="setFormIcon('${e}')"
              style="background:rgba(255,255,255,0.06);cursor:pointer;font-size:16px;padding:4px 8px">${e}</span>`
          ).join("")}</div>
        </div>
        <div class="form-row">
          <span class="form-label">Color</span>
          <div class="cat-picker">${YEARLY_COLORS.map(c =>
            `<span class="cat-chip ${S.formData.color===c?"selected":""}" onclick="setFormColor('${c}')"
              style="background:${c};width:28px;height:28px;border-radius:8px;padding:0"></span>`
          ).join("")}</div>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="showAddForm(null)">Cancel</button>
          <button class="btn-save" onclick="addYearlyTask()">Add Goal</button>
        </div>
      </div>`;
    }
  }

  // Reset
  h += `
    <div class="reset-section">
      <button class="reset-btn" onclick="resetAll()">🗑 Reset All Data</button>
    </div>
  </div>`;

  app.innerHTML = h;

  // Auto-focus first input in add/edit form
  const inp = document.getElementById("add-name") || document.getElementById("edit-name");
  if (inp) setTimeout(() => inp.focus(), 50);
}

function renderAddButton(type, label) {
  if (S.showForm === type) return "";
  return `<button class="add-btn" onclick="showAddForm('${type}')">
    <span style="font-size:18px;line-height:1">+</span> ${label}
  </button>`;
}

// ========== INIT ==========
render(); // Render immediately from localStorage cache
loadFromSupabase(); // Then sync from Supabase (updates UI when done)

// Re-sync when tab becomes visible again (user switches back)
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") loadFromSupabase();
});
</script>
</body>
</html>
